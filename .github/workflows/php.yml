name: Shopware Plugin CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

permissions:
  contents: read

jobs:
  quality:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, gd, zip
          coverage: none

      - name: Validate composer.json
        run: composer validate

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # ✅ Lint PHP (fast fail)
      - name: Lint PHP files
        run: find src -type f -name "*.php" -print0 | xargs -0 -n1 php -l

      # ✅ Static analysis
      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse src --no-progress

      # ✅ Code style
      - name: Run PHP CS Fixer
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff

      # ✅ Unit tests ONLY (no Shopware kernel!)
      - name: Run PHPUnit
        run: ./vendor/bin/phpunit tests/Unit --testdox --no-coverage
